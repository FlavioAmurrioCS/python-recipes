# yaml-language-server: $schema=https://www.schemastore.org/pre-commit-config.json
---
ci:
  skip:
    - uv-lock
    - taplo-lint
    - uv-mypy
    - uv-pyrefly
    - uv-ty
    - uv-pyright
    - uv-test
    - uv-basedpyright
    - uv-zuban
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.16
    hooks:
      - id: uv-lock
      - id: uv-export
  - repo: https://github.com/ComPWA/mirrors-taplo
    rev: "v0.9.3"
    hooks:
      - id: taplo-format
      - id: taplo-lint
        args: []
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        types_or: [python, pyi, jupyter]
        args: [--fix, --unsafe-fixes]
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements
      - id: name-tests-test
      - id: requirements-txt-fixer
  - repo: local
    hooks:
      - id: uv-ty
        name: uv-ty
        entry: env VIRTUAL_ENV= uv run --group=type-checkers ty check
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-pyrefly
        name: uv-pyrefly
        entry: env VIRTUAL_ENV= uv run --group=type-checkers pyrefly check
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-zuban
        name: uv-zuban
        entry: env VIRTUAL_ENV= uv run --group=type-checkers zuban check
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-mypy
        name: uv-mypy
        entry: env VIRTUAL_ENV= uv run mypy
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-basedpyright
        name: uv-basedpyright
        entry: env VIRTUAL_ENV= uv run --group=type-checkers basedpyright
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-pyright
        name: uv-pyright
        entry: env VIRTUAL_ENV= uv run --group=type-checkers pyright
        language: python
        'types_or': [python, pyi]
        require_serial: true
        additional_dependencies: [uv]
      - id: uv-test
        name: uv-test
        entry: env VIRTUAL_ENV= uv run pytest
        language: python
        types: [python]
        pass_filenames: false
        always_run: true
        additional_dependencies: [uv]
